networks:
  kvtide:
    name: kvtide
    driver: bridge

services:
  executor:
    container_name: executor
    build:
      context: .
      dockerfile: docker/executor.Dockerfile
    image: kvtide-executor:local
    expose:
      - "19991"
    volumes:
      - ./executor/models/Qwen3-0.6B:/app/models/Qwen3-0.6B:ro
    networks:
      - kvtide

  server:
    container_name: server
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    image: kvtide-server:local
    command:
      - --conf=/etc/kvtide/server.toml
    depends_on:
      - executor
    ports:
      - "8800:8800"
      - "8801:8801"
    volumes:
      - ./config/compose-server.toml:/etc/kvtide/server.toml:ro
      - ./executor/models/Qwen3-0.6B:/models/Qwen3-0.6B:ro
    networks:
      - kvtide

  web:
    container_name: web
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: kvtide-web:local
    depends_on:
      - server
    environment:
      KVTIDE_API_UPSTREAM: http://server:8800
      KVTIDE_METRICS_UPSTREAM: http://server:8801
    ports:
      - "5173:5173"
    networks:
      - kvtide

  dashboard:
    container_name: dashboard
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    image: kvtide-dashboard:local
    depends_on:
      - server
    environment:
      KVTIDE_ADMIN_UPSTREAM: http://server:8801
    ports:
      - "5174:5174"
    networks:
      - kvtide
