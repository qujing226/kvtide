# 表示当前 YAML 创建的是 k8s 内置的 CustomResourceDefinition 对象。
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition

metadata:
  name: kvtideruntimes.serving.kvtide.io

spec:
  group: serving.kvtide.io
  scope: Namespaced

  names:
    plural: kvtideruntimes
    singular: kvtideruntime
    kind: KVTideRuntime
    shortNames:
      - kvt
  
  versions:
    - name: v1alpha1
      served: true
      storage: true

      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - server
                - executor
                - scheduler
              properties:
                server:
                  type: object
                  required:
                    - image
                  properties:
                    image:
                      type: string
                      minLength: 1

                executor:
                  type: object
                  required: 
                    - image
                  properties:
                    image:
                      type: string
                      minLength: 1
                scheduler:
                  type: object
                  required:
                    - maxBatchSeqs
                    - maxBatchTokens
                  properties:
                    maxBatchSeqs:
                      type: integer
                      format: int32
                      minimum: 1
                    maxBatchTokens:
                      type: integer
                      format: int32
                      minimum: 1


              
# kubectl apply -f crd.yaml
#        ↓
# 请求发送给 kube-apiserverd
#         ↓
# CRD schema 被校验并存入 etcd
#        ↓
# API Server 注册新 REST API
#        ↓
# /apis/serving.kvtide.io/v1alpha1/
#         ↓
# kubectl 可以操作 KVTideRuntime

# path:
# /apis/serving.kvtide.io/v1alpha1/namespaces/kvtide/kvtideruntimes/demo

# 验证：
# kubectl api-resources | grep -i kvtide
# kubectl get crd kvtideruntimes.serving.kvtide.io
# kubectl describe crd kvtideruntimes.serving.kvtide.io
