# 表示当前 YAML 创建的是 k8s 内置的 CustomResourceDefinition 对象。
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition

metadata:
  name: minillmruntimes.serving.mini-llm.io

spec:
  group: serving.mini-llm.io
  scope: Namespaced

  names:
    plural: minillmruntimes
    singular: minillmruntime
    kind: MiniLLMRuntime
    shortNames:
      - mlr
  
  versions:
    - name: v1alpha1
      served: true
      storage: true

      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - server
                - executor
                - scheduler
              properties:
                server:
                  type: object
                  required:
                    - image
                  properties:
                    image:
                      type: string
                      minLength: 1

                executor:
                  type: object
                  required: 
                    - image
                  properties:
                    image:
                      type: string
                      minLength: 1
                scheduler:
                  type: object
                  required:
                    - maxBatchSeqs
                    - maxBatchTokens
                  properties:
                    maxBatchSeqs:
                      type: integer
                      format: int32
                      minimum: 1
                    maxBatchTokens:
                      type: integer
                      format: int32
                      minimum: 1


              
# kubectl apply -f crd.yaml
#        ↓
# 请求发送给 kube-apiserverd
#         ↓
# CRD schema 被校验并存入 etcd
#        ↓
# API Server 注册新 REST API
#        ↓
# /apis/serving.mini-llm.io/v1alpha1/
#         ↓
# kubectl 可以操作 MiniLLMRuntime

# path:
# /apis/serving.mini-llm.io/v1alpha1/namespaces/mini-llm/minillmruntimes/demo

# 验证：
# kubectl api-resources | grep -i minillm 
# kubectl get crd minillmruntimes.serving.mini-llm.io
# kubectl describe crd minillmruntimes.serving.mini-llm.io