apiVersion: serving.kvtide.io/v1alpha1
kind: KVTideRuntime

metadata:
  name: demo
  namespace: kvtide

spec:
  server:
    image: kvtide-server:local

  executor:
    image: kvtide-executor:local

  scheduler:
    maxBatchSeqs: 32
    maxBatchTokens: 2048

  
