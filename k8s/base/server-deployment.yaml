apiVersion: apps/v1
kind: Deployment

metadata:
  name: server
  namespace: kvtide

spec:
  replicas: 1

  selector:
    matchLabels:
      app: server

  template:
    metadata:
      labels:
        app: server

    spec:
      volumes:
        - name: config
          configMap:
            name: server-config

      containers:
        - name: server
          image: kvtide-server:local
          imagePullPolicy: IfNotPresent

          ports:
            - name: server
              containerPort: 8800
            - name: metrics
              containerPort: 8801

          volumeMounts:
            - name: config
              mountPath: /etc/kvtide
              readOnly: true

          args:
            - --conf=/etc/kvtide/server.toml

          readinessProbe:
            httpGet:
              path: "/metrics"
              port: metrics
            initialDelaySeconds: 2
            periodSeconds: 3
            timeoutSeconds: 1
            failureThreshold: 3

          livenessProbe:
            tcpSocket:
              port: server
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"