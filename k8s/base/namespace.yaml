# Namespace 属于 k8s 核心 API group，因此写 v1。
# Namespace, Pod, Service, ConfigMap 等基础资源属于 core group。
# core group 的 group 名是空字符串，因此只写版本 v1。
# Deployment 属于 apps group，所以写 apps/v1
apiVersion: v1
# Namespace 是 k8s api 资源的逻辑隔离范围。
kind: Namespace
metadata:
  # 资源名称，后续所有业务资源都部署到该 namespace
  name: mini-llm

# 应用
# kubectl apply -f k8s/base/namespace.yaml
# 执行流程：
#  -> 读取 YAML
#  -> 根据当前 kubeconfig 找到 API Server
#  -> 把 Namespace 对象发送给 API Server
#  -> API Server 校验对象
#  -> 保存到 etcd
