[server]
address = "127.0.0.1:8800"
adminPort = 8801

[server.scheduleConf]
maxBatchSeqs = 32
maxBatchTokens = 2048
longPrefillTokenThreshold = 512
maxPartialPrefills = 2
maxLongPartialPrefills = 1
maxScheduleDelay = 10 # ms

[server.scheduleConf.queueConf]
queueLength = 100

[[models]]
modelId = "Qwen/Qwen3-0.6B"
modelPath = "./executor/models/Qwen3-0.6B"

[[executors]]
executorId = "executor-qwen3-0.6B"
address = ["http://127.0.0.1:19991"]
timeoutMs = 120000
