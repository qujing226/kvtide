[server]
address = "0.0.0.0:8800"
adminPort = 8801
allowedOrigins = [
  "http://localhost:5173",
  "http://127.0.0.1:5173",
]

[server.scheduleConf]
maxBatchSeqs = 32
maxBatchTokens = 2048
longPrefillTokenThreshold = 512
maxPartialPrefills = 2
maxLongPartialPrefills = 1
maxScheduleDelay = 10 # ms

[server.scheduleConf.queueConf]
queueLength = 100

# Mount tokenizer files into the server container before enabling this.
[[tokenizer]]
kind = "qwen"
model = "qwen3"
vocabPath = "./config/tokenizer/qwen3-tokenizer/vocab.json"
mergesPath = "./config/tokenizer/qwen3-tokenizer/merges.txt"
tokenizerConfigPath = "./config/tokenizer/qwen3-tokenizer/tokenizer_config.json"

[[executors]]
id = "mock-python"
kind = "connect"
address = ["http://executor:19991"]
enabled = true
